name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: tf plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: gcp auth (tf plan)
        id: auth
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193
        with:
          workload_identity_provider: projects/546928617664/locations/global/workloadIdentityPools/gha-terraform-checker-pool/providers/gha-terraform-checker-provider
          # Read-only identity: plan runs against untrusted PR code and must not
          # hold write or secret-read permissions.
          service_account: gha-cf-tf-plan@jeffreyhung-test.iam.gserviceaccount.com

      - name: terraform plan
        id: terraform-plan
        uses: dflook/terraform-plan@7878bff63e2099cdc9be9a6f33cbbbf687f8f0fe # v2.2.3
        if:
          ${{ steps.auth.outcome == 'success'}}
        with:
          add_github_comment: changes-only
        env:
            GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
